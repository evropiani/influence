name: Deploy to cPanel mirror

# Mirrors the site to the private server on every push to main.
#
# IMPORTANT: the FTP account is scoped to the projects.hamza.at DOCUMENT ROOT,
# not to the influence folder — so the site is staged into an influence/
# subfolder locally and synced from there. Never sync the repo root directly:
# that squats the game's files onto the root of the domain (which hosts the
# owner's own landing page and other projects).
on:
  push:
    branches: [main]
  workflow_dispatch:      # allows manual runs from the Actions tab

concurrency:
  group: cpanel-deploy
  cancel-in-progress: false

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage the site under influence/
        run: |
          mkdir -p _site/influence
          rsync -a --exclude '_site' --exclude '.git' --exclude '.github' ./ _site/influence/

      - name: Sync files via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./_site/
          server-dir: ./
          # The sync state lives at the server root, so this run also DELETES the
          # game files earlier runs wrongly uploaded to the domain root (only files
          # this action itself uploaded — the owner's own files are not tracked and
          # are never touched).
