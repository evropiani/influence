<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>Influence</title>
<link rel="stylesheet" href="influence.css">
</head>
<body>
<div id="wrap">
  <div id="topbar"><div id="scoreboard"></div><div id="clock">0:00</div></div>
  <div id="stage">
    <canvas id="game" width="1000" height="667"></canvas>
    <canvas id="minimap" width="150" height="101"></canvas>
    <div id="flash"></div>
    <div id="spawnHint"></div>
    <div id="overlay">
     <div id="ovbox">
      <div id="otitle">Influence</div>
      <div id="osub"></div>
      <div id="setup" class="field" style="gap:18px">
        <div class="field"><label>Clan tag &amp; name</label><div class="namerow"><input id="tagIn" maxlength="3" placeholder="TAG" autocomplete="off"><input id="nameIn" maxlength="14" value="Player" autocomplete="off"></div></div>
        <div class="field"><label>Your colour</label><div id="swatches"></div></div>
        <div class="field"><label>Opponents (1–99)</label><div id="opps"></div></div>
        <div class="field"><label>Mode</label><div id="mode"></div></div>
      </div>
      <div id="standings"></div>
      <button id="obtn">Start</button>
     </div>
    </div>
  </div>
  <div id="bottombar">
    <div class="stat" id="influence"><span class="k">Influence</span><span class="v">0</span></div>
    <div class="stat"><span class="k">Income</span><span class="v" id="incomeV">0</span><span class="ctx">/s</span></div>
    <div class="commit"><span class="k">Commit</span><input id="pct" type="range" min="5" max="100" step="5" value="50"><span id="pctV">50%</span><span class="ctx">&rarr; <b id="budgetV">0</b> px</span></div>
    <span id="cellInfo"></span>
    <span id="baseInfo" class="ok"></span>
    <div id="buildbar">
      <button id="wallBtn" class="bbtn" disabled>Wall 20</button>
      <button id="farmBtn" class="bbtn" disabled>Farm 500</button>
      <button id="outBtn" class="bbtn" disabled>Outpost 300</button>
    </div>
    <div class="spacer"></div>
    <div id="hint">Tap to grow · drag to pan · wheel to zoom · Ctrl+click or Wall to build walls</div>
  </div>
</div>

<script src="influence.js" defer></script>
</body>
</html>
